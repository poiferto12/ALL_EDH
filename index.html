<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALL_EDH - Commander Deck Builder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>ALL_EDH</h1>
      <p>Crea sugerencias de mazos Commander con Scryfall y prioriza tu colección.</p>

      <form id="deck-form">
        <label for="commander">Comandante</label>
        <input id="commander" name="commander" type="text" placeholder="Atraxa, Praetors' Voice" required />

        <label for="theme">Estrategia / Arquetipo principal</label>
        <select id="theme" name="theme">
          <option value="none">Sinergia General (Automático)</option>
          <option value="voltron">Voltron (Auras/Equipos)</option>
          <option value="lifegain">Ganancia de Vidas (Lifegain)</option>
          <option value="tokens">Criaturas Ficha (Tokens)</option>
          <option value="aristocrats">Sacrificio (Aristocrats)</option>
          <option value="burn">Daño Directo (Burn)</option>
          <option value="storm">Spellslinger / Storm (Hechizos)</option>
          <option value="artifacts">Artefactos Completos</option>
          <option value="graveyard">Cementerio / Reanimator</option>
          <option value="aggro">Ataque Masivo (Aggro)</option>
        </select>

        <label for="collection">Tu colección (una carta por línea, opcional cantidad con "2x Nombre")</label>
        <textarea id="collection" name="collection" rows="8" placeholder="Sol Ring\nArcane Signet\n2x Swords to Plowshares"></textarea>

        <fieldset style="display: grid; gap: 0.5rem; padding: 1rem; border: 1px solid #ccc; border-radius: 8px;">
          <legend>Plantilla del Mazo (99 cartas en total)</legend>
          <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <label style="display: flex; flex-direction: column;">Tierras
              <input type="number" name="lands" value="36" min="0" max="50" style="width: 80px;" />
            </label>
            <label style="display: flex; flex-direction: column;">Ramp
              <input type="number" name="ramp" value="10" min="0" max="30" style="width: 80px;" />
            </label>
            <label style="display: flex; flex-direction: column;">Robo (Draw)
              <input type="number" name="draw" value="10" min="0" max="30" style="width: 80px;" />
            </label>
            <label style="display: flex; flex-direction: column;">Removal
              <input type="number" name="removal" value="8" min="0" max="30" style="width: 80px;" />
            </label>
            <label style="display: flex; flex-direction: column;">Limpiamesas (Wipes)
              <input type="number" name="wipe" value="3" min="0" max="10" style="width: 80px;" />
            </label>
            <label style="display: flex; flex-direction: column;">Tutores
              <input type="number" name="tutor" value="2" min="0" max="10" style="width: 80px;" />
            </label>
            <label style="display: flex; flex-direction: column;">Protección
              <input type="number" name="protection" value="5" min="0" max="15" style="width: 80px;" />
            </label>
            <label style="display: flex; flex-direction: column;">Recursión
              <input type="number" name="recursion" value="3" min="0" max="15" style="width: 80px;" />
            </label>
          </div>
          <small>El resto (hasta 99) se llenará con cartas de "Sinergia / Flexibles".</small>
        </fieldset>

        <label for="budget">Presupuesto Máximo ($) para cartas faltantes (0 = Sin límite)</label>
        <input id="budget" name="budget" type="number" value="0" min="0" step="1" />

        <button type="submit">Generar sugerencias</button>
      </form>

      <section id="status" aria-live="polite"></section>
      <section id="summary"></section>
      <div id="recommendations" class="deck-grid"></div>
    </main>

    <div id="card-tooltip" style="display: none; position: fixed; z-index: 1000; pointer-events: none;">
      <img id="tooltip-img" src="" alt="Carta completa" style="width: 250px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.6);" />
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
