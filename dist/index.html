<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>ALL EDH</title>
    <script type="module" crossorigin src="/assets/index-CmNY1CmR.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CBnCh2Zy.css">
  </head>

  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Commander deck builder</p>
          <h1>ALL EDH</h1>
          <p class="subtitle">
            Genera una lista de Commander priorizando tu colección,
            tu presupuesto y la coherencia global del mazo.
          </p>
        </div>
      </section>

      <section class="panel">
        <form id="deck-form" class="form-grid">
          <label class="field field-wide">
            <span>Comandante</span>
            <input
              name="commander"
              type="text"
              placeholder="Ej. Muldrotha, the Gravetide"
              autocomplete="off"
              required
            />
          </label>

          <label class="field">
            <span>Tema</span>
            <select name="theme">
              <option value="none">Automático / ninguno</option>
              <option value="tokens">Tokens</option>
              <option value="aristocrats">Aristocrats</option>
              <option value="graveyard">Cementerio</option>
              <option value="storm">Spellslinger / Storm</option>
              <option value="voltron">Voltron</option>
              <option value="lifegain">Lifegain</option>
              <option value="artifacts">Artefactos</option>
              <option value="counters">Contadores</option>
              <option value="tribal">Tribal</option>
              <option value="control">Control</option>
              <option value="aggro">Aggro</option>
              <option value="ramp">Ramp</option>
              <option value="enchantress">Enchantress</option>
            </select>
          </label>

          <label class="field">
            <span>Presupuesto máximo USD</span>
            <input
              name="budget"
              type="number"
              min="0"
              step="1"
              placeholder="0 = sin límite"
              value="0"
            />
          </label>

          <label class="field">
            <span>Tierras</span>
            <input
              name="lands"
              type="number"
              min="28"
              max="45"
              value="38"
            />
          </label>

          <label class="field">
            <span>Ramp</span>
            <input
              name="ramp"
              type="number"
              min="0"
              max="25"
              value="10"
            />
          </label>

          <label class="field">
            <span>Robo</span>
            <input
              name="draw"
              type="number"
              min="0"
              max="25"
              value="10"
            />
          </label>

          <label class="field">
            <span>Removal</span>
            <input
              name="removal"
              type="number"
              min="0"
              max="25"
              value="8"
            />
          </label>

          <label class="field">
            <span>Wipes</span>
            <input
              name="wipe"
              type="number"
              min="0"
              max="12"
              value="3"
            />
          </label>

          <label class="field">
            <span>Tutores</span>
            <input
              name="tutor"
              type="number"
              min="0"
              max="15"
              value="2"
            />
          </label>

          <label class="field">
            <span>Recursión</span>
            <input
              name="recursion"
              type="number"
              min="0"
              max="15"
              value="3"
            />
          </label>

          <label class="field">
            <span>Protección</span>
            <input
              name="protection"
              type="number"
              min="0"
              max="15"
              value="5"
            />
          </label>

          <label class="field field-wide">
            <span>Colección</span>
            <textarea
              name="collection"
              rows="9"
              placeholder="Pega aquí tu colección. Ej:
Sol Ring
2 Arcane Signet
3x Swords to Plowshares"
            ></textarea>
          </label>

          <div class="actions field-wide">
            <button id="submit-btn" type="submit">
              Generar Mazo
            </button>

            <button
              id="export-btn"
              type="button"
              class="secondary-button"
              hidden
            >
              Exportar lista (.txt)
            </button>
          </div>
        </form>
      </section>

      <section class="panel results-panel">
        <div class="results-header">
          <div>
            <h2>Resultado</h2>
            <p id="status" class="status">
              Indica un comandante para empezar.
            </p>
          </div>

          <p id="summary" class="summary"></p>
        </div>

        <ul
          id="recommendations"
          class="recommendations"
        ></ul>
      </section>
    </main>

  </body>
</html>
